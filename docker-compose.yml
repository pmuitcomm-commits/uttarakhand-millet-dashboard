version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: millet_db
    environment:
      POSTGRES_USER: ${DB_USER:-millet_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-millet_pass}
      POSTGRES_DB: ${DB_NAME:-millet_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-millet_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: millet_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-millet_user}:${DB_PASSWORD:-millet_pass}@postgres:5432/${DB_NAME:-millet_db}
      DEBUG: "false"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: millet_frontend
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
