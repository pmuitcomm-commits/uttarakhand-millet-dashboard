services:
  # FastAPI Backend
  - type: web
    name: uttarakhand-millet-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        sync: false
      - key: ALLOW_LOCAL_INIT_DB
        sync: false
      - key: APP_ENV
        sync: false
      - key: AUTO_CREATE_TABLES
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_SSLMODE
        sync: false
      - key: DB_USER
        sync: false
      - key: ENROLLMENT_OTP_EXPIRY_SECONDS
        sync: false
      - key: ENROLLMENT_OTP_MAX_ATTEMPTS
        sync: false
      - key: ENV
        sync: false
      - key: ENVIRONMENT
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_BLOCK_PASSWORD
        sync: false
      - key: SEED_DISTRICT_PASSWORD
        sync: false
      - key: SEED_FARMER_PASSWORD
        sync: false

  # React Frontend
  - type: web
    name: uttarakhand-millet-dashboard
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false
      - key: REACT_APP_API_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=()"
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains; preload"
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://images.unsplash.com https://static.pib.gov.in https://nfsm.gov.in https://cdnbbsr.s3waas.gov.in https://www.pib.gov.in https://pmfby.gov.in https://india.gov.in https://uk.gov.in https://agriculture.uk.gov.in https://agricoop.nic.in https://mkisan.gov.in; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://uttarakhand-millet-dashboard.onrender.com;"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
